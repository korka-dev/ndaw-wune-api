# Toutes les valeurs sont lues depuis .env — aucune valeur en dur ici.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    pull_policy: never
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    pull_policy: never
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n '${REDIS_PASSWORD:-}' ]; then
          redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass '${REDIS_PASSWORD}';
        else
          redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru;
        fi
      "
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Surcharge pour utiliser les noms de service Docker (réseau interne)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      REDIS_URL:    redis://redis:${REDIS_PORT:-6379}/${REDIS_DB:-0}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # En développement uniquement — retirer en production
    volumes:
      - .:/app
      # Volume persistant pour les fichiers uploadés (ressources pédagogiques)
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
